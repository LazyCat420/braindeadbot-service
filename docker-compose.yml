version: '3.8'

services:
  braindeadbot-service:
    image: braindeadbot-service:latest
    container_name: braindeadbot-service
    restart: unless-stopped
    ports:
      # Bound to the LAN address only, not 0.0.0.0.
      #
      # `"5175:5175"` publishes on every interface the host has. This service has
      # no auth, so that exposed the leaderboard write API to anything that could
      # reach any of the host's addresses — tunnels and VPN interfaces included.
      #
      # The LAN IP is the narrowest binding that still works: the leaderboard is
      # read and written by the *browser* (see client src/services/api-config.ts),
      # not server-side by the client container, so LAN browsers must reach it
      # directly. 127.0.0.1 would break every visitor. Containers on the host can
      # still reach the host's LAN IP, so the client container is unaffected.
      - "${SERVICE_BIND_IP:-10.0.0.16}:5175:5175"
    environment:
      - PORT=5175
      - NODE_ENV=production
    volumes:
      - /usr/share/zoneinfo/America/Los_Angeles:/etc/localtime:ro
      # THE LEADERBOARD LIVES HERE.
      #
      # src/lib/db.ts writes SQLite to `process.cwd()/data`, i.e. /app/data. This
      # mount was missing, so the database sat in the container's writable layer
      # — and deploy does `compose down` then `up -d`, which destroys it. Every
      # deploy silently wiped every score.
      #
      # It went unnoticed because the board was empty. Pinball Knight is about to
      # start writing real scores, so it would not have stayed unnoticed.
      - ./data:/app/data
